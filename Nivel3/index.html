<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel 3</title>

    <style>
        ul {
            font-size: 20px;
            font-family: Arial, sans-serif;
            color: blue;
        }
    </style>

</head>
<body>

    <ul>
        <li>Estudar HTML</li>
        <li>Estudar CSS</li>
        <li>Estudar JavaScript</li>
    </ul>

</body>
</html>

<!--
Este código mostra uma página HTML que utiliza uma lista não ordenada.
A tag <ul> cria uma lista com marcadores (bolinhas), e cada <li> representa
um item da lista. No <head>, foi usado CSS interno com a tag <style> para
personalizar a aparência da lista, definindo o tamanho da fonte, o tipo de
fonte e a cor do texto. Isso demonstra como organizar informações em forma
de lista e aplicar estilos visuais com CSS.
-->
