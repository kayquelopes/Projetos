<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel 4</title>

    <style>
        ul {
            font-size: 20px;
            font-family: Arial, sans-serif;
            color: blue;
        }
    </style>

</head>
<body>

    <div style="background-color: rgb(208, 231, 0); border-radius: 8px; padding: 20px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);">
        <ul>
            <li>Estudar HTML</li>
            <li>Estudar CSS</li>
            <li>Estudar JavaScript</li>
        </ul>
    </div>
    
</body>
</html>

<!--
Este código mostra uma página HTML que utiliza uma <div> como uma “caixa” para organizar o conteúdo.
Dentro dessa <div> há uma lista não ordenada (<ul>) com itens (<li>). O CSS da lista é definido
na tag <style>, controlando tamanho, fonte e cor do texto. Já a <div> usa CSS inline (direto na tag),
onde são aplicados estilos como cor de fundo, bordas arredondadas, espaçamento interno (padding)
e sombra (box-shadow), criando um visual mais destacado e organizado para o conteúdo da página.
-->
