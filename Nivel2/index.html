<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel 2</title>

    <style>
        body {
            background-color: #000000;
            font-family: Arial;
        }

        h1 {
            color: #ff0000;
        }

        p {
            color: #fffb00;
            font-size: 20px;
        }
    </style>

</head>
<body>
    <h1>Exemplo 2</h1>
    <p>Este é um parágrafo de exemplo.</p>
</body>
</html>

<!--
Este código mostra uma página HTML com uso de CSS interno.
Além da estrutura básica do HTML, foi adicionada a tag <style> dentro do <head>,
que permite estilizar os elementos da página. No CSS, o seletor "body" define
o fundo da página como preto e a fonte como Arial. O seletor "h1" altera a cor
do título para vermelho, enquanto o seletor "p" muda a cor do texto para amarelo
e aumenta o tamanho da fonte. Isso demonstra como o CSS é usado para controlar
a aparência visual do site.
-->
