<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel 5</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="galeria">
        <img style="width: 200px;" src="imagens/It lets your creativity flourish.jpg" alt="It lets your creativity flourish">
        <img style="width: 200px;" src="imagens/Lisa.jpg" alt="Lisa">
        <img style="width: 200px;" src="imagens/It lets your creativity flourish.jpg" alt="It lets your creativity flourish">
        <img style="width: 200px;" src="imagens/Lisa.jpg" alt="Lisa">
    </div>

</body>
</html>

<!--
Este código mostra uma página HTML que utiliza um arquivo CSS externo, conectado pela tag <link>,
o que é uma forma mais organizada e profissional de aplicar estilos. No <body>, há uma <div> com a
classe "galeria", usada para agrupar várias imagens. Cada imagem é inserida com a tag <img>, que usa
o atributo "src" para indicar o caminho do arquivo e "alt" para descrever a imagem (importante para
acessibilidade). O tamanho das imagens foi definido com CSS inline (width: 200px), controlando a
largura de cada uma. Esse exemplo demonstra como criar uma galeria de imagens e separar o estilo em
um arquivo externo.
-->
