<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel 6</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">Serviços</a>
        <a href="#">Contato</a>
    </nav>

</body>
</html>

<!--
Este código mostra uma página HTML com um menu de navegação.
A tag <nav> é usada para agrupar links importantes do site, geralmente no topo da página.
Dentro dela, as tags <a> criam links clicáveis, onde o atributo "href" define o destino
(do jeito que está "#", não leva a lugar nenhum, é apenas um exemplo). O estilo da página
é controlado por um arquivo CSS externo (style.css), permitindo organizar melhor o código
e separar estrutura (HTML) de aparência (CSS). Esse exemplo representa a base de um menu
de navegação simples para um site.
-->
