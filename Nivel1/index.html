<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel 1</title>
</head>

<body>
    <h1>Esta é uma tag de título.</h1>
    <p>Esta é uma tag de parágrafo.</p>
</body>

</html>

<!-- 
Este código é a estrutura básica de uma página HTML. 
A linha <!DOCTYPE html> define que estamos usando HTML5. 
A tag <html> inicia o documento e define o idioma como português. 
Dentro de <head> ficam as configurações, como suporte a acentos (UTF-8), 
adaptação para diferentes telas (responsivo) e o título que aparece na aba do navegador. 
Já a tag <body> contém o conteúdo visível da página, como o título (<h1>) e o parágrafo (<p>). 
-->
